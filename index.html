<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Notizen"/>
<meta name="theme-color" content="#0f0e0d"/>
<title>Notizen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; background: #0f0e0d; }
  body { font-family: 'Georgia', 'Times New Roman', serif; color: #e8e2d9; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #3a3530; border-radius: 2px; }
  ::placeholder { color: #5a5248; }
  input, textarea, select { font-family: 'Source Serif 4', Georgia, serif; -webkit-appearance: none; appearance: none; }
  input[type="date"] { -webkit-appearance: none; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
  @keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 0.18s ease; }
  .tap-row { transition: background 0.1s; }
  .tap-row:active { background: #1e1b18 !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">

const { useState, useEffect, useRef, useCallback } = React;

// ─── Constants ────────────────────────────────────────────────────────────────

const DEFAULT_CATEGORIES = [
  { id:"urlaub",      label:"Urlaub",                 icon:"✦", color:"#c8a96e", children:[{id:"urlaub-planung",label:"Planung"},{id:"urlaub-ideen",label:"Reiseideen"}] },
  { id:"haus",        label:"Hausrenovierung",         icon:"◈", color:"#7eb8a0", children:[{id:"haus-fenster",label:"Fenster / Fechtali"},{id:"haus-wdvs",label:"WDVS"},{id:"haus-sonstiges",label:"Sonstiges"}] },
  { id:"gutachten",   label:"Gutachten",               icon:"⊕", color:"#a09bc8", children:[{id:"gutachten-aktiv",label:"Laufende Fälle"},{id:"gutachten-methodik",label:"Methodik"},{id:"gutachten-literatur",label:"Literatur"}] },
  { id:"arbeit",      label:"Arbeit",                  icon:"◉", color:"#c8857e", children:[{id:"arbeit-ftk",label:"Familientagesklinik"},{id:"arbeit-forschung",label:"Forschung"},{id:"arbeit-kongress",label:"DGKJP / Kongress"}] },
  { id:"kinder",      label:"Kinder",                  icon:"◌", color:"#e0b86e", children:[{id:"kinder-hobbies",label:"Hobbies"},{id:"kinder-schule",label:"Schule"},{id:"kinder-alltag",label:"Alltag"}] },
  { id:"philosophie", label:"Philosophie & Schreiben", icon:"∿", color:"#8ab0c8", children:[{id:"phil-buch",label:"Buchprojekt"},{id:"phil-lyrik",label:"Lyrik / Songs"},{id:"phil-nzz",label:"NZZ / Publikationen"}] },
];

const MAX_BYTES = 4 * 1024 * 1024;
const LS = {
  get: (k) => { try { return localStorage.getItem(k); } catch(_){ return null; } },
  set: (k,v) => { try { localStorage.setItem(k,v); return true; } catch(e){ return false; } },
  del: (k) => { try { localStorage.removeItem(k); } catch(_){} },
};

// ─── Helpers ──────────────────────────────────────────────────────────────────

const genId    = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const fmtDate  = ts => { const d=new Date(ts); return d.toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"})+" · "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}); };
const fmtBytes = b => b<1024?b+" B":b<1048576?(b/1024).toFixed(0)+" KB":(b/1048576).toFixed(1)+" MB";
const docIcon  = ext => ({pdf:"📕",doc:"📘",docx:"📘",xls:"📗",xlsx:"📗",ppt:"📙",pptx:"📙",txt:"📄",csv:"📊",zip:"🗜"}[ext]||"📄");
const isMobile = () => window.innerWidth < 768;

function deadlineStatus(iso) {
  if (!iso) return null;
  const diff = new Date(iso).getTime() - Date.now();
  const days = Math.ceil(diff/86400000);
  if (diff<0)   return { label:`Überfällig (${Math.abs(days)}d)`, color:"#c8574e", bg:"#2a1412" };
  if (days===0) return { label:"Heute fällig!", color:"#e09060", bg:"#251b10" };
  if (days<=3)  return { label:`Noch ${days} Tag${days>1?"e":""}`, color:"#c8a96e", bg:"#221e10" };
  if (days<=14) return { label:`Noch ${days} Tage`, color:"#8ab0c8", bg:"#101820" };
  return { label: new Date(iso).toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"}), color:"#5a5248", bg:"transparent" };
}

function compressImage(file, maxW=1400, q=0.80) {
  return new Promise((res,rej) => {
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const s=Math.min(1,maxW/img.width), w=Math.round(img.width*s), h=Math.round(img.height*s);
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res({ dataUrl:c.toDataURL("image/jpeg",q), w, h });
    };
    img.onerror=rej; img.src=url;
  });
}
function readFile(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
}

// ─── Storage helpers (localStorage) ──────────────────────────────────────────

function loadNotes()      { try { return JSON.parse(LS.get("nz-notes")||"{}"); } catch(_){ return {}; } }
function loadCategories() { try { return JSON.parse(LS.get("nz-cats")||"null")||DEFAULT_CATEGORIES; } catch(_){ return DEFAULT_CATEGORIES; } }
function saveNotes(n)     { LS.set("nz-notes", JSON.stringify(n)); }
function saveCategories(c){ LS.set("nz-cats",  JSON.stringify(c)); }

function storeAttach(dataUrl, meta) {
  const size = Math.round(dataUrl.split(",")[1].length * 0.75);
  if (size > MAX_BYTES) return { error: `Zu groß (${fmtBytes(size)}). Max. 4 MB.` };
  const id = genId(), key = "nz-a-" + id;
  const ok = LS.set(key, dataUrl);
  if (!ok) return { error: "localStorage voll. Bitte alte Anhänge löschen." };
  return { id, storageKey: key, size, ...meta };
}
function loadAttach(key) { return LS.get(key); }
function delAttach(key)  { LS.del(key); }

// ─── Sub-components ───────────────────────────────────────────────────────────

function AttachThumb({ attach, onOpen, onDelete }) {
  const [src, setSrc] = useState(null);
  useEffect(() => { const d=loadAttach(attach.storageKey); if(d) setSrc(d); }, [attach.storageKey]);
  return (
    <div onClick={()=>onOpen(attach)} style={{ position:"relative", borderRadius:8, overflow:"hidden", background:"#1a1715", border:"1px solid #2a2520", cursor:"pointer", aspectRatio:"4/3" }}>
      {src ? <img src={src} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/> : <div style={{ width:"100%", height:"100%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:28 }}>🖼</div>}
      <button onClick={e=>{e.stopPropagation();onDelete(attach);}} style={{ position:"absolute", top:6, right:6, background:"rgba(0,0,0,0.75)", border:"none", borderRadius:"50%", width:26, height:26, color:"#fff", cursor:"pointer", fontSize:13, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
      <div style={{ position:"absolute", bottom:0, left:0, right:0, background:"rgba(0,0,0,0.6)", padding:"4px 8px", fontSize:10, color:"#c0b8ae" }}>{fmtBytes(attach.size)}</div>
    </div>
  );
}

function VoiceBtn({ onText, onErr, big }) {
  const [on, setOn] = useState(false);
  const ref = useRef(null);
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  function toggle() {
    if (!SR) { onErr("Spracheingabe: bitte Chrome oder Safari 15+ nutzen."); return; }
    if (on) { ref.current?.stop(); setOn(false); return; }
    const r = new SR(); r.lang="de-DE"; r.interimResults=false; r.continuous=true;
    r.onresult = e => { const t=Array.from(e.results).map(x=>x[0].transcript).join(" "); onText(t); };
    r.onerror = e => { onErr("Mikrofon: "+e.error); setOn(false); };
    r.onend = ()=>setOn(false);
    r.start(); ref.current=r; setOn(true);
  }
  return (
    <button onClick={toggle} style={{ background:on?"#c8574e":"none", border:`1px solid ${on?"#c8574e":"#3a3530"}`, borderRadius:big?10:6, color:on?"#fff":"#8a8278", padding:big?"12px 18px":"7px 12px", cursor:"pointer", fontSize:big?15:12, display:"flex", alignItems:"center", gap:6, animation:on?"pulse 1.4s ease-in-out infinite":"none", flex:big?1:undefined, justifyContent:"center", fontFamily:"'Source Serif 4',Georgia,serif" }}>
      {on?"⏹ Stopp":"🎙 Einsprechen"}
    </button>
  );
}

// ─── MOBILE VIEW ─────────────────────────────────────────────────────────────

function MobileView() {
  const [cats, setCats]           = useState(loadCategories);
  const [notes, setNotes]         = useState(loadNotes);
  const [screen, setScreen]       = useState("cats"); // cats | list | editor
  const [selId, setSelId]         = useState(null);
  const [note, setNote]           = useState(null);
  const [editing, setEditing]     = useState(false);
  const [eTitle, setETitle]       = useState("");
  const [eBody, setEBody]         = useState("");
  const [eDl, setEDl]             = useState("");
  const [showDl, setShowDl]       = useState(false);
  const [expanded, setExpanded]   = useState({});
  const [search, setSearch]       = useState("");
  const [filterOD, setFilterOD]   = useState(false);
  const [lightbox, setLightbox]   = useState(null);
  const [uploading, setUploading] = useState(false);
  const [err, setErr]             = useState("");
  const [camOpen, setCamOpen]     = useState(false);
  const [camStream, setCamStream] = useState(null);
  const [newCatModal, setNewCatModal] = useState(false);
  const [newCatParent, setNewCatParent] = useState(null);
  const [newCatLabel, setNewCatLabel]   = useState("");
  const [confirm, setConfirm]     = useState(null); // {msg, onYes}
  const bodyRef = useRef(), imgRef = useRef(), docRef = useRef(), vidRef = useRef();

  useEffect(()=>{ saveNotes(notes); }, [notes]);
  useEffect(()=>{ saveCategories(cats); }, [cats]);
  useEffect(()=>{ if(!camOpen&&camStream){ camStream.getTracks().forEach(t=>t.stop()); setCamStream(null); } }, [camOpen,camStream]);

  function getCatColor(id){ for(const c of cats){ if(c.id===id) return c.color; for(const ch of(c.children||[])) if(ch.id===id) return c.color; } return "#888"; }
  function getCatLabel(id){ for(const c of cats){ if(c.id===id) return c.label; for(const ch of(c.children||[])) if(ch.id===id) return c.label+" · "+ch.label; } return id; }

  const selColor = selId ? getCatColor(selId) : "#c8a96e";

  let listNotes = filterOD
    ? Object.values(notes).flat().filter(n=>n.deadline&&new Date(n.deadline)<new Date())
    : search.trim()
      ? Object.entries(notes).flatMap(([cId,ns])=>ns.filter(n=>n.title.toLowerCase().includes(search.toLowerCase())||(n.body||"").toLowerCase().includes(search.toLowerCase())).map(n=>({...n,catId:cId})))
      : (selId ? notes[selId]||[] : []);

  const overdueCount = Object.values(notes).flat().filter(n=>n.deadline&&new Date(n.deadline)<new Date()).length;
  const attachments  = note?.attachments||[];
  const imgs = attachments.filter(a=>a.type==="image");
  const docs = attachments.filter(a=>a.type==="doc");
  const dlSt = deadlineStatus(note?.deadline);

  function openNote(n){ setNote(n); setEditing(false); setETitle(n.title); setEBody(n.body||""); setEDl(n.deadline||""); setShowDl(!!n.deadline); setErr(""); setScreen("editor"); }
  function newNote(){
    const catId=selId||"arbeit";
    const n={id:genId(),title:"Neue Notiz",body:"",deadline:"",attachments:[],createdAt:Date.now(),updatedAt:Date.now(),catId};
    setNotes(p=>{ const r={...p,[catId]:[n,...(p[catId]||[])]}; saveNotes(r); return r; });
    setNote(n); setETitle(n.title); setEBody(""); setEDl(""); setEditing(true); setShowDl(false); setScreen("editor");
    setTimeout(()=>bodyRef.current?.focus(),120);
  }
  function saveNote(){
    if(!note) return;
    const u={...note,title:eTitle||"Ohne Titel",body:eBody,deadline:showDl?eDl:"",updatedAt:Date.now()};
    setNotes(p=>{ const r={...p,[note.catId]:(p[note.catId]||[]).map(n=>n.id===u.id?u:n)}; saveNotes(r); return r; });
    setNote(u); setEditing(false);
  }
  function deleteNoteConfirm(){
    setConfirm({ msg:"Notiz löschen?", onYes:()=>{
      (note.attachments||[]).forEach(a=>delAttach(a.storageKey));
      setNotes(p=>{ const r={...p,[note.catId]:(p[note.catId]||[]).filter(n=>n.id!==note.id)}; saveNotes(r); return r; });
      setNote(null); setScreen("list"); setConfirm(null);
    }});
  }
  function patchNote(patch){
    const u={...note,...patch,updatedAt:Date.now()};
    setNotes(p=>{ const r={...p,[note.catId]:(p[note.catId]||[]).map(n=>n.id===u.id?u:n)}; saveNotes(r); return r; });
    setNote(u);
  }

  async function handleImg(file){
    if(!file?.type.startsWith("image/")) return;
    setUploading(true); setErr("");
    try { const {dataUrl,w,h}=await compressImage(file); const a=storeAttach(dataUrl,{name:file.name,type:"image",w,h}); if(a.error){setErr(a.error);}else{patchNote({attachments:[...attachments,a]});} }
    catch(e){ setErr("Fehler: "+e.message); }
    setUploading(false);
  }
  async function handleDoc(file){
    if(!file) return;
    if(file.size>MAX_BYTES){setErr(`Zu groß (${fmtBytes(file.size)}). Max. 4 MB.`);return;}
    setUploading(true); setErr("");
    try { const dataUrl=await readFile(file); const a=storeAttach(dataUrl,{name:file.name,type:"doc",ext:file.name.split(".").pop().toLowerCase()}); if(a.error){setErr(a.error);}else{patchNote({attachments:[...attachments,a]});} }
    catch(e){ setErr("Fehler: "+e.message); }
    setUploading(false);
  }
  function delAttachment(a){ delAttach(a.storageKey); patchNote({attachments:attachments.filter(x=>x.id!==a.id)}); }
  function openLb(a){ const d=loadAttach(a.storageKey); if(d) setLightbox({dataUrl:d,name:a.name,type:a.type,ext:a.ext}); }

  async function openCam(){
    try { const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}); setCamStream(s); setCamOpen(true); setTimeout(()=>{ if(vidRef.current) vidRef.current.srcObject=s; },100); }
    catch(e){ setErr("Kamera: "+e.message); }
  }
  function capturePhoto(){
    const v=vidRef.current; if(!v) return;
    const c=document.createElement("canvas"); c.width=v.videoWidth; c.height=v.videoHeight;
    c.getContext("2d").drawImage(v,0,0);
    const dataUrl=c.toDataURL("image/jpeg",0.82);
    setCamOpen(false);
    const a=storeAttach(dataUrl,{name:`Foto_${Date.now()}.jpg`,type:"image",w:c.width,h:c.height});
    if(a.error){setErr(a.error);}else{patchNote({attachments:[...attachments,a]});}
  }

  function addCat(parentId,label){
    if(!label.trim()) return;
    const id=label.toLowerCase().replace(/\s+/g,"-")+"-"+genId().slice(0,4);
    if(parentId){ setCats(p=>p.map(c=>c.id===parentId?{...c,children:[...(c.children||[]),{id,label:label.trim()}]}:c)); }
    else { const icons=["◆","◇","○","□","△","▽","⬡","⬢"]; setCats(p=>[...p,{id,label:label.trim(),icon:icons[Math.floor(Math.random()*icons.length)],color:`hsl(${Math.floor(Math.random()*360)},45%,65%)`,children:[]}]); }
    setNewCatModal(false); setNewCatLabel("");
  }

  const NAV = 56;
  const S = {
    hdr: { padding:"0 18px", height:56, display:"flex", alignItems:"center", gap:12, borderBottom:"1px solid #2a2520", background:"#0f0e0d", position:"sticky", top:0, zIndex:10, paddingTop:"env(safe-area-inset-top,0px)", flexShrink:0 },
    back: { background:"none", border:"none", color:"#8a8278", fontSize:24, cursor:"pointer", padding:"6px 10px 6px 0", lineHeight:1 },
    title: { fontFamily:"'Playfair Display',Georgia,serif", fontSize:19, fontWeight:600, color:"#e8e2d9", flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" },
    inp: { width:"100%", background:"#1a1715", border:"1px solid #2a2520", borderRadius:10, padding:"13px 14px", color:"#e8e2d9", fontSize:16, outline:"none" },
    ghostBtn: { background:"none", border:"1px solid #2a2520", borderRadius:8, color:"#8a8278", fontSize:14, padding:"10px 14px", cursor:"pointer", display:"flex", alignItems:"center", gap:5, justifyContent:"center", fontFamily:"'Source Serif 4',Georgia,serif" },
    primBtn: (c) => ({ background:c||"#c8a96e", border:"none", borderRadius:8, color:"#0f0e0d", padding:"10px 18px", fontSize:14, cursor:"pointer", fontWeight:700, fontFamily:"'Source Serif 4',Georgia,serif" }),
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"#0f0e0d", overflow:"hidden" }}>

      {/* ── CATEGORIES SCREEN ── */}
      {screen==="cats" && (
        <div className="screen" style={{ paddingBottom:NAV }}>
          <div style={S.hdr}>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:20, fontWeight:600 }}>Notizen</div>
              <div style={{ fontSize:10, color:"#5a5248", letterSpacing:"0.1em", textTransform:"uppercase" }}>Lebensbereiche</div>
            </div>
            {overdueCount>0 && <div onClick={()=>{setFilterOD(true);setScreen("list");}} style={{ background:"#2a1412", border:"1px solid #c8574e40", borderRadius:8, padding:"6px 12px", cursor:"pointer" }}>
              <span style={{ fontSize:12, color:"#c8574e" }}>⏱ {overdueCount}</span>
            </div>}
          </div>
          <div style={{ padding:"14px 18px", borderBottom:"1px solid #1e1b18", flexShrink:0 }}>
            <input value={search} onChange={e=>{setSearch(e.target.value);if(e.target.value.trim()){setSelId(null);setScreen("list");}}} placeholder="Notizen suchen …" style={S.inp}/>
          </div>
          <div style={{ flex:1, overflowY:"auto" }}>
            {cats.map(cat=>(
              <div key={cat.id}>
                <div className="tap-row" onClick={()=>{setSelId(cat.id);setFilterOD(false);setSearch("");setExpanded(p=>({...p,[cat.id]:!p[cat.id]}));setScreen("list");}} style={{ display:"flex", alignItems:"center", padding:"15px 18px", cursor:"pointer", borderBottom:"1px solid #1e1b18", gap:14 }}>
                  <div style={{ width:42, height:42, borderRadius:10, background:cat.color+"22", border:`1px solid ${cat.color}44`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, color:cat.color, flexShrink:0 }}>{cat.icon}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:16, color:"#e8e2d9" }}>{cat.label}</div>
                    <div style={{ fontSize:12, color:"#5a5248", marginTop:2 }}>{(notes[cat.id]||[]).length+(cat.children||[]).reduce((s,c)=>s+(notes[c.id]||[]).length,0)} Notizen</div>
                  </div>
                  <span style={{ fontSize:16, color:"#3a3530" }}>›</span>
                </div>
                {(cat.children||[]).map(ch=>(
                  <div key={ch.id} className="tap-row" onClick={()=>{setSelId(ch.id);setFilterOD(false);setSearch("");setScreen("list");}} style={{ display:"flex", alignItems:"center", padding:"12px 18px 12px 74px", cursor:"pointer", borderBottom:"1px solid #1a1714", background:"#0c0b0a", gap:10 }}>
                    <span style={{ fontSize:8, color:cat.color }}>◦</span>
                    <div style={{ flex:1 }}><div style={{ fontSize:15, color:"#b0a89e" }}>{ch.label}</div><div style={{ fontSize:11, color:"#4a4540" }}>{(notes[ch.id]||[]).length} Notizen</div></div>
                    <span style={{ fontSize:14, color:"#3a3530" }}>›</span>
                  </div>
                ))}
                <div className="tap-row" onClick={e=>{e.stopPropagation();setNewCatParent(cat.id);setNewCatModal(true);}} style={{ padding:"10px 18px 10px 74px", borderBottom:"1px solid #1a1714", cursor:"pointer" }}>
                  <span style={{ fontSize:12, color:"#3a3530" }}>+ Unterbereich …</span>
                </div>
              </div>
            ))}
            <div className="tap-row" onClick={()=>{setNewCatParent(null);setNewCatModal(true);}} style={{ padding:"16px 18px", cursor:"pointer", display:"flex", alignItems:"center", gap:14, borderBottom:"1px solid #1e1b18" }}>
              <div style={{ width:42, height:42, borderRadius:10, background:"#1a1715", border:"1px solid #2a2520", display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, color:"#3a3530" }}>+</div>
              <span style={{ fontSize:15, color:"#4a4540" }}>Neuer Bereich …</span>
            </div>
          </div>
        </div>
      )}

      {/* ── LIST SCREEN ── */}
      {screen==="list" && (
        <div className="screen" style={{ paddingBottom:NAV }}>
          <div style={S.hdr}>
            <button onClick={()=>{setScreen("cats");setFilterOD(false);}} style={S.back}>‹</button>
            <div style={{ ...S.title, color:filterOD?"#c8574e":selColor }}>{filterOD?"Überfällig":search?"Suche":selId?getCatLabel(selId):"Alle"}</div>
            {selId&&!filterOD&&<button onClick={newNote} style={{ background:selColor, border:"none", borderRadius:9, color:"#0f0e0d", fontSize:24, width:38, height:38, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, flexShrink:0 }}>+</button>}
          </div>
          {!filterOD&&<div style={{ padding:"10px 18px", borderBottom:"1px solid #1e1b18", flexShrink:0 }}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Suchen …" style={{ ...S.inp, fontSize:15 }}/>
          </div>}
          <div style={{ flex:1, overflowY:"auto" }}>
            {listNotes.length===0&&<div style={{ padding:"48px 24px", color:"#3a3530", fontSize:14, textAlign:"center", lineHeight:2 }}>Keine Notizen.<br/>Oben + tippen.</div>}
            {listNotes.map(n=>{ const ds=deadlineStatus(n.deadline); return (
              <div key={n.id} className="tap-row" onClick={()=>openNote(n)} style={{ padding:"16px 18px", borderBottom:"1px solid #1e1b18", cursor:"pointer" }}>
                <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:16, color:"#e8e2d9", marginBottom:4, fontWeight:500 }}>{n.title||"Ohne Titel"}</div>
                {(search||filterOD)&&<div style={{ fontSize:10, color:getCatColor(n.catId), marginBottom:4, letterSpacing:"0.08em", textTransform:"uppercase" }}>{getCatLabel(n.catId)}</div>}
                <div style={{ fontSize:13, color:"#5a5248", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", marginBottom:5 }}>{(n.body||"").slice(0,70)||"—"}</div>
                <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                  <div style={{ fontSize:11, color:"#3a3530" }}>{fmtDate(n.updatedAt)}</div>
                  {(n.attachments||[]).length>0&&<div style={{ fontSize:11, color:"#4a4540" }}>· {(n.attachments||[]).length}×📎</div>}
                  {ds&&<div style={{ fontSize:11, color:ds.color }}>· ⏱ {ds.label}</div>}
                </div>
              </div>
            );})}
          </div>
        </div>
      )}

      {/* ── EDITOR SCREEN ── */}
      {screen==="editor"&&note&&(
        <div className="screen" style={{ paddingBottom:NAV }}>
          <div style={S.hdr}>
            <button onClick={()=>{setScreen("list");setEditing(false);}} style={S.back}>‹</button>
            <div style={{ fontSize:10, color:selColor, letterSpacing:"0.12em", textTransform:"uppercase", flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{getCatLabel(note.catId)}</div>
            {editing
              ?<><button onClick={saveNote} style={S.primBtn(selColor)}>Sichern</button><button onClick={()=>{setEditing(false);setETitle(note.title);setEBody(note.body||"");setEDl(note.deadline||"");setShowDl(!!note.deadline);}} style={{ ...S.ghostBtn, fontSize:13, padding:"8px 10px", marginLeft:6 }}>✕</button></>
              :<><button onClick={()=>setEditing(true)} style={{ ...S.ghostBtn, fontSize:13, padding:"8px 14px" }}>Bearbeiten</button><button onClick={deleteNoteConfirm} style={{ background:"none", border:"none", color:"#6a3a36", fontSize:24, cursor:"pointer", padding:"4px 0 4px 10px" }}>🗑</button></>}
          </div>
          {!editing&&note.deadline&&<div style={{ padding:"10px 18px", borderBottom:"1px solid #1e1b18", background:dlSt?.bg||"transparent", flexShrink:0 }}>
            <span style={{ fontSize:13, color:dlSt?.color||"#8a8278" }}>⏱ {new Date(note.deadline).toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"})} — {dlSt?.label}</span>
          </div>}
          <div style={{ flex:1, overflowY:"auto", padding:"22px 20px 36px" }}>
            {editing
              ?<input value={eTitle} onChange={e=>setETitle(e.target.value)} placeholder="Titel …" style={{ width:"100%", background:"none", border:"none", borderBottom:"1px solid #2a2520", outline:"none", fontFamily:"'Playfair Display',Georgia,serif", fontSize:22, fontWeight:600, color:"#e8e2d9", marginBottom:20, lineHeight:1.3, padding:"0 0 12px" }}/>
              :<><h1 style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:23, fontWeight:600, color:"#e8e2d9", marginBottom:8, lineHeight:1.35 }}>{note.title}</h1><div style={{ fontSize:11, color:"#3a3530", marginBottom:22 }}>{fmtDate(note.updatedAt)}</div></>}

            {editing&&<div style={{ marginBottom:18 }}>
              {!showDl
                ?<button onClick={()=>setShowDl(true)} style={{ ...S.ghostBtn, fontSize:13, padding:"10px 14px" }}>⏱ Frist setzen</button>
                :<div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                  <span style={{ fontSize:13, color:"#8a8278" }}>⏱</span>
                  <input type="date" value={eDl} onChange={e=>setEDl(e.target.value)} style={{ background:"#1a1715", border:"1px solid #3a3530", borderRadius:8, color:"#c8c0b4", padding:"10px 14px", fontSize:16, outline:"none" }}/>
                  <button onClick={()=>{setShowDl(false);setEDl("");}} style={{ background:"none", border:"none", color:"#5a5248", cursor:"pointer", fontSize:20 }}>✕</button>
                </div>}
            </div>}

            {editing&&<div style={{ display:"flex", gap:8, marginBottom:14 }}>
              <VoiceBtn onText={t=>setEBody(p=>p+(p.trim()?" ":"")+t)} onErr={setErr} big={true}/>
            </div>}

            {editing
              ?<textarea ref={bodyRef} value={eBody} onChange={e=>setEBody(e.target.value)} placeholder="Hier tippen oder einsprechen …" style={{ width:"100%", background:"#1a1715", border:"1px solid #2a2520", borderRadius:10, outline:"none", padding:"14px", fontFamily:"'Source Serif 4',Georgia,serif", fontSize:16, color:"#c8c0b4", lineHeight:1.85, resize:"none", minHeight:220, marginBottom:28 }}/>
              :<div style={{ fontFamily:"'Source Serif 4',Georgia,serif", fontSize:16, color:"#c8c0b4", lineHeight:1.9, whiteSpace:"pre-wrap", marginBottom:28 }}>{note.body||<span style={{ color:"#3a3530", fontStyle:"italic" }}>Leer — Bearbeiten tippen.</span>}</div>}

            {/* Attachments */}
            <div style={{ borderTop:"1px solid #1e1b18", paddingTop:22 }}>
              <div style={{ fontSize:11, color:"#5a5248", letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>Anhänge {attachments.length>0&&`(${attachments.length})`}</div>
              <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
                <button onClick={openCam} style={{ ...S.ghostBtn, flex:"1 1 auto" }}>📷 Kamera</button>
                <button onClick={()=>imgRef.current?.click()} style={{ ...S.ghostBtn, flex:"1 1 auto" }}>🖼 Bild</button>
                <button onClick={()=>docRef.current?.click()} style={{ ...S.ghostBtn, flex:"1 1 auto" }}>📄 Dokument</button>
              </div>
              <input ref={imgRef} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>{if(e.target.files[0])handleImg(e.target.files[0]);e.target.value="";}}/>
              <input ref={docRef} type="file" accept=".pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx,.csv,.zip" style={{ display:"none" }} onChange={e=>{if(e.target.files[0])handleDoc(e.target.files[0]);e.target.value="";}}/>
              {uploading&&<div style={{ fontSize:13, color:"#8a8278", marginBottom:10 }}>Wird verarbeitet …</div>}
              {err&&<div style={{ fontSize:13, color:"#c8574e", marginBottom:10, padding:"10px 14px", background:"#1e1b18", borderRadius:8, display:"flex", gap:8 }}><span style={{ flex:1 }}>{err}</span><button onClick={()=>setErr("")} style={{ background:"none", border:"none", color:"#c8574e", cursor:"pointer", fontSize:18 }}>✕</button></div>}
              {imgs.length>0&&<div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:10, marginBottom:docs.length>0?14:0 }}>{imgs.map(a=><AttachThumb key={a.id} attach={a} onOpen={openLb} onDelete={delAttachment}/>)}</div>}
              {docs.map(a=>(
                <div key={a.id} onClick={()=>openLb(a)} className="tap-row" style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", background:"#1a1715", border:"1px solid #2a2520", borderRadius:10, marginTop:8, cursor:"pointer" }}>
                  <span style={{ fontSize:26 }}>{docIcon(a.ext)}</span>
                  <div style={{ flex:1, minWidth:0 }}><div style={{ fontSize:14, color:"#c0b8ae", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{a.name}</div><div style={{ fontSize:11, color:"#4a4540" }}>{fmtBytes(a.size)}</div></div>
                  <button onClick={e=>{e.stopPropagation();delAttachment(a);}} style={{ background:"none", border:"none", color:"#4a4540", cursor:"pointer", fontSize:20, padding:"4px 8px" }}>✕</button>
                </div>
              ))}
              {attachments.length===0&&!uploading&&<div style={{ fontSize:13, color:"#3a3530", fontStyle:"italic" }}>Noch keine Anhänge.</div>}
              <div style={{ marginTop:14, fontSize:10, color:"#2e2b28" }}>Bilder komprimiert · Dokumente max. 4 MB · In diesem Gerät gespeichert</div>
            </div>
          </div>
        </div>
      )}

      {/* ── BOTTOM NAV ── */}
      <div style={{ position:"fixed", bottom:0, left:0, right:0, background:"#161412", borderTop:"1px solid #2a2520", display:"flex", alignItems:"stretch", paddingBottom:"env(safe-area-inset-bottom,0px)", zIndex:50, height:NAV+"px" }}>
        {[
          ["◈","Bereiche","cats",()=>setScreen("cats")],
          selId&&["☰","Liste","list",()=>setScreen("list")],
          note&&["✎","Notiz","editor",()=>setScreen("editor")],
        ].filter(Boolean).map(([icon,label,sc,fn])=>(
          <button key={sc} onClick={fn} style={{ flex:1, background:"none", border:"none", cursor:"pointer", color:screen===sc?selColor:"#5a5248", fontSize:10, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:3, padding:"6px 0" }}>
            <span style={{ fontSize:22 }}>{icon}</span>{label}
          </button>
        ))}
        {selId&&!filterOD&&<button onClick={newNote} style={{ flex:1, background:selColor, border:"none", cursor:"pointer", color:"#0f0e0d", fontSize:10, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:2, padding:"6px 0", fontWeight:700 }}>
          <span style={{ fontSize:26, lineHeight:1 }}>+</span>Neu
        </button>}
      </div>

      {/* ── CAMERA ── */}
      {camOpen&&<div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.96)", zIndex:300, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:20 }}>
        <video ref={vidRef} autoPlay playsInline style={{ maxWidth:500, width:"94vw", borderRadius:12, background:"#1a1715" }}/>
        <div style={{ display:"flex", gap:14 }}>
          <button onClick={capturePhoto} style={{ background:"#c8a96e", border:"none", borderRadius:12, color:"#0f0e0d", padding:"14px 32px", fontSize:16, cursor:"pointer", fontWeight:700 }}>📸 Aufnehmen</button>
          <button onClick={()=>setCamOpen(false)} style={{ background:"none", border:"1px solid #3a3530", borderRadius:12, color:"#8a8278", padding:"14px 22px", fontSize:16, cursor:"pointer" }}>Abbrechen</button>
        </div>
      </div>}

      {/* ── LIGHTBOX ── */}
      {lightbox&&<div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.97)", zIndex:300, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }} onClick={()=>setLightbox(null)}>
        <div style={{ fontSize:12, color:"#8a8278", padding:"0 20px", textAlign:"center" }}>{lightbox.name}</div>
        {lightbox.type==="image"
          ?<img src={lightbox.dataUrl} alt="" style={{ maxWidth:"96vw", maxHeight:"72vh", borderRadius:8, objectFit:"contain" }}/>
          :<div style={{ background:"#1a1715", borderRadius:10, padding:"40px 60px", textAlign:"center" }}><div style={{ fontSize:56, marginBottom:12 }}>{docIcon(lightbox.ext)}</div><div style={{ fontSize:15, color:"#c0b8ae" }}>{lightbox.name}</div></div>}
        <div style={{ display:"flex", gap:12 }} onClick={e=>e.stopPropagation()}>
          <button onClick={()=>{const a=document.createElement("a");a.href=lightbox.dataUrl;a.download=lightbox.name;a.click();}} style={{ background:"#c8a96e", border:"none", borderRadius:8, color:"#0f0e0d", padding:"12px 22px", fontSize:14, cursor:"pointer", fontWeight:700 }}>↓ Herunterladen</button>
          <button onClick={()=>setLightbox(null)} style={{ background:"none", border:"1px solid #3a3530", borderRadius:8, color:"#8a8278", padding:"12px 18px", fontSize:14, cursor:"pointer" }}>Schließen</button>
        </div>
      </div>}

      {/* ── NEW CATEGORY SHEET ── */}
      {newCatModal&&<div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:200 }} onClick={()=>setNewCatModal(false)}>
        <div style={{ position:"absolute", bottom:0, left:0, right:0, background:"#1a1715", borderRadius:"16px 16px 0 0", padding:"28px 24px", paddingBottom:"calc(28px + env(safe-area-inset-bottom,0px))", animation:"slideUp 0.22s ease" }} onClick={e=>e.stopPropagation()}>
          <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:18, marginBottom:20, color:"#e8e2d9" }}>{newCatParent?`Unterbereich zu „${cats.find(c=>c.id===newCatParent)?.label}"`:"Neuer Lebensbereich"}</div>
          <input autoFocus value={newCatLabel} onChange={e=>setNewCatLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCat(newCatParent,newCatLabel)} placeholder="Name …" style={{ ...S.inp, marginBottom:16, fontSize:16 }}/>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={()=>setNewCatModal(false)} style={{ flex:1, background:"none", border:"1px solid #3a3530", borderRadius:10, color:"#6a6258", padding:"14px", cursor:"pointer", fontSize:15 }}>Abbrechen</button>
            <button onClick={()=>addCat(newCatParent,newCatLabel)} style={{ flex:2, background:"#c8a96e", border:"none", borderRadius:10, color:"#0f0e0d", padding:"14px", cursor:"pointer", fontSize:15, fontWeight:700 }}>Erstellen</button>
          </div>
        </div>
      </div>}

      {/* ── CONFIRM DIALOG ── */}
      {confirm&&<div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:400, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
        <div style={{ background:"#1a1715", borderRadius:14, padding:"28px 24px", maxWidth:320, width:"100%" }}>
          <div style={{ fontSize:16, color:"#e8e2d9", marginBottom:24, textAlign:"center" }}>{confirm.msg}</div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={()=>setConfirm(null)} style={{ flex:1, background:"none", border:"1px solid #3a3530", borderRadius:10, color:"#6a6258", padding:"14px", cursor:"pointer", fontSize:15 }}>Abbrechen</button>
            <button onClick={confirm.onYes} style={{ flex:1, background:"#c8574e", border:"none", borderRadius:10, color:"#fff", padding:"14px", cursor:"pointer", fontSize:15, fontWeight:700 }}>Löschen</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// ─── DESKTOP VIEW ─────────────────────────────────────────────────────────────

function DesktopView() {
  const [cats, setCats]           = useState(loadCategories);
  const [notes, setNotes]         = useState(loadNotes);
  const [selId, setSelId]         = useState(null);
  const [note, setNote]           = useState(null);
  const [editing, setEditing]     = useState(false);
  const [eTitle, setETitle]       = useState("");
  const [eBody, setEBody]         = useState("");
  const [eDl, setEDl]             = useState("");
  const [showDl, setShowDl]       = useState(false);
  const [expanded, setExpanded]   = useState({});
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [search, setSearch]       = useState("");
  const [filterOD, setFilterOD]   = useState(false);
  const [lightbox, setLightbox]   = useState(null);
  const [uploading, setUploading] = useState(false);
  const [err, setErr]             = useState("");
  const [camOpen, setCamOpen]     = useState(false);
  const [camStream, setCamStream] = useState(null);
  const [newCatModal, setNewCatModal]   = useState(false);
  const [newCatParent, setNewCatParent] = useState(null);
  const [newCatLabel, setNewCatLabel]   = useState("");
  const bodyRef=useRef(), imgRef=useRef(), docRef=useRef(), vidRef=useRef();

  useEffect(()=>{ saveNotes(notes); }, [notes]);
  useEffect(()=>{ saveCategories(cats); }, [cats]);
  useEffect(()=>{ if(!camOpen&&camStream){ camStream.getTracks().forEach(t=>t.stop()); setCamStream(null); } }, [camOpen,camStream]);

  function getCatColor(id){ for(const c of cats){if(c.id===id)return c.color;for(const ch of(c.children||[]))if(ch.id===id)return c.color;}return"#888"; }
  function getCatLabel(id){ for(const c of cats){if(c.id===id)return c.label;for(const ch of(c.children||[]))if(ch.id===id)return c.label+" · "+ch.label;}return id; }

  const selColor = selId ? getCatColor(selId) : "#c8a96e";
  const overdueCount = Object.values(notes).flat().filter(n=>n.deadline&&new Date(n.deadline)<new Date()).length;
  const notesForSel  = selId ? (notes[selId]||[]) : [];
  let displayNotes = filterOD
    ? Object.values(notes).flat().filter(n=>n.deadline&&new Date(n.deadline)<new Date())
    : search.trim()
      ? Object.entries(notes).flatMap(([c,ns])=>ns.filter(n=>n.title.toLowerCase().includes(search.toLowerCase())||(n.body||"").toLowerCase().includes(search.toLowerCase())).map(n=>({...n,catId:c})))
      : notesForSel;
  const attachments = note?.attachments||[];
  const imgs=attachments.filter(a=>a.type==="image"), docs=attachments.filter(a=>a.type==="doc");
  const dlSt = deadlineStatus(note?.deadline);

  function openNote(n){ setNote(n); setEditing(false); setETitle(n.title); setEBody(n.body||""); setEDl(n.deadline||""); setShowDl(!!n.deadline); setErr(""); }
  function newNote(){ const cId=selId||"arbeit"; const n={id:genId(),title:"Neue Notiz",body:"",deadline:"",attachments:[],createdAt:Date.now(),updatedAt:Date.now(),catId:cId}; setNotes(p=>{const r={...p,[cId]:[n,...(p[cId]||[])]}; saveNotes(r); return r;}); setNote(n); setETitle(n.title); setEBody(""); setEDl(""); setEditing(true); setShowDl(false); setTimeout(()=>bodyRef.current?.focus(),80); }
  function saveNote(){ if(!note) return; const u={...note,title:eTitle||"Ohne Titel",body:eBody,deadline:showDl?eDl:"",updatedAt:Date.now()}; setNotes(p=>{const r={...p,[note.catId]:(p[note.catId]||[]).map(n=>n.id===u.id?u:n)}; saveNotes(r); return r;}); setNote(u); setEditing(false); }
  function deleteNote(){ if(!window.confirm("Notiz löschen?")) return; (note.attachments||[]).forEach(a=>delAttach(a.storageKey)); setNotes(p=>{const r={...p,[note.catId]:(p[note.catId]||[]).filter(n=>n.id!==note.id)}; saveNotes(r); return r;}); setNote(null); }
  function patchNote(patch){ const u={...note,...patch,updatedAt:Date.now()}; setNotes(p=>{const r={...p,[note.catId]:(p[note.catId]||[]).map(n=>n.id===u.id?u:n)}; saveNotes(r); return r;}); setNote(u); }

  async function handleImg(file){ if(!file?.type.startsWith("image/")) return; setUploading(true); setErr(""); try{const{dataUrl,w,h}=await compressImage(file);const a=storeAttach(dataUrl,{name:file.name,type:"image",w,h});if(a.error){setErr(a.error);}else{patchNote({attachments:[...attachments,a]});}}catch(e){setErr("Fehler: "+e.message);} setUploading(false); }
  async function handleDoc(file){ if(!file) return; if(file.size>MAX_BYTES){setErr(`Zu groß (${fmtBytes(file.size)}). Max. 4 MB.`);return;} setUploading(true); setErr(""); try{const dataUrl=await readFile(file);const a=storeAttach(dataUrl,{name:file.name,type:"doc",ext:file.name.split(".").pop().toLowerCase()});if(a.error){setErr(a.error);}else{patchNote({attachments:[...attachments,a]});}}catch(e){setErr("Fehler: "+e.message);} setUploading(false); }
  function delAttachment(a){ delAttach(a.storageKey); patchNote({attachments:attachments.filter(x=>x.id!==a.id)}); }
  function openLb(a){ const d=loadAttach(a.storageKey); if(d) setLightbox({dataUrl:d,name:a.name,type:a.type,ext:a.ext}); }
  async function openCam(){ try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});setCamStream(s);setCamOpen(true);setTimeout(()=>{if(vidRef.current)vidRef.current.srcObject=s;},100);}catch(e){setErr("Kamera: "+e.message);} }
  function capturePhoto(){ const v=vidRef.current;if(!v)return;const c=document.createElement("canvas");c.width=v.videoWidth;c.height=v.videoHeight;c.getContext("2d").drawImage(v,0,0);const dataUrl=c.toDataURL("image/jpeg",0.82);setCamOpen(false);const a=storeAttach(dataUrl,{name:`Foto_${Date.now()}.jpg`,type:"image",w:c.width,h:c.height});if(a.error){setErr(a.error);}else{patchNote({attachments:[...attachments,a]});} }
  function addCat(parentId,label){ if(!label.trim()) return; const id=label.toLowerCase().replace(/\s+/g,"-")+"-"+genId().slice(0,4); if(parentId){setCats(p=>p.map(c=>c.id===parentId?{...c,children:[...(c.children||[]),{id,label:label.trim()}]}:c));}else{const icons=["◆","◇","○","□","△","▽","⬡","⬢"];setCats(p=>[...p,{id,label:label.trim(),icon:icons[Math.floor(Math.random()*icons.length)],color:`hsl(${Math.floor(Math.random()*360)},45%,65%)`,children:[]}]);} setNewCatModal(false);setNewCatLabel(""); }

  const gBtn = { background:"none", border:"1px solid #2a2520", borderRadius:6, color:"#8a8278", padding:"6px 11px", cursor:"pointer", fontSize:11, fontFamily:"'Source Serif 4',Georgia,serif" };

  return (
    <div style={{ display:"flex", height:"100vh", background:"#0f0e0d", overflow:"hidden" }}>
      {/* Sidebar */}
      <aside style={{ width:sidebarOpen?240:0, minWidth:sidebarOpen?240:0, background:"#161412", borderRight:"1px solid #2a2520", display:"flex", flexDirection:"column", overflow:"hidden", transition:"width 0.25s cubic-bezier(.4,0,.2,1),min-width 0.25s cubic-bezier(.4,0,.2,1)" }}>
        <div style={{ padding:"26px 20px 14px", borderBottom:"1px solid #2a2520", flexShrink:0 }}>
          <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:18, fontWeight:600 }}>Notizen</div>
          <div style={{ fontSize:10, color:"#5a5248", letterSpacing:"0.12em", textTransform:"uppercase", marginTop:2 }}>Lebensbereiche</div>
        </div>
        <div style={{ padding:"10px 14px", borderBottom:"1px solid #2a2520", flexShrink:0 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Suchen …" style={{ width:"100%", background:"#1e1b18", border:"1px solid #2a2520", borderRadius:6, padding:"7px 10px", color:"#e8e2d9", fontSize:12, outline:"none" }}/>
        </div>
        {overdueCount>0&&<div onClick={()=>setFilterOD(o=>!o)} style={{ padding:"8px 16px", cursor:"pointer", borderBottom:"1px solid #2a2520", background:filterOD?"#2a1412":"transparent", flexShrink:0 }}>
          <span style={{ fontSize:11, color:"#c8574e" }}>⏱ {overdueCount} überfällig</span>
        </div>}
        <nav style={{ flex:1, overflowY:"auto", padding:"8px 0" }}>
          {cats.map(cat=>(
            <div key={cat.id}>
              <div style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 14px", cursor:"pointer", background:selId===cat.id?"#1e1b18":"transparent", borderLeft:selId===cat.id?`2px solid ${cat.color}`:"2px solid transparent" }}
                onClick={()=>{setSelId(cat.id);setExpanded(p=>({...p,[cat.id]:!p[cat.id]}));setNote(null);setSearch("");setFilterOD(false);}}>
                <span style={{ color:cat.color, fontSize:13 }}>{cat.icon}</span>
                <span style={{ flex:1, fontSize:12.5, fontWeight:500, fontFamily:"'Playfair Display',Georgia,serif", color:selId===cat.id?"#e8e2d9":"#b0a89e", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{cat.label}</span>
                <span style={{ fontSize:9, color:"#5a5248", transform:expanded[cat.id]?"rotate(90deg)":"rotate(0)", transition:"transform 0.2s" }}>▶</span>
              </div>
              {expanded[cat.id]&&(cat.children||[]).map(ch=>(
                <div key={ch.id} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 14px 6px 36px", cursor:"pointer", background:selId===ch.id?"#1e1b18":"transparent", borderLeft:selId===ch.id?`2px solid ${cat.color}`:"2px solid transparent" }}
                  onClick={()=>{setSelId(ch.id);setNote(null);setSearch("");setFilterOD(false);}}>
                  <span style={{ fontSize:8, color:cat.color, opacity:0.6 }}>◦</span>
                  <span style={{ fontSize:11.5, color:selId===ch.id?"#e8e2d9":"#8a8278", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{ch.label}</span>
                </div>
              ))}
              {expanded[cat.id]&&<div style={{ padding:"4px 14px 4px 36px", cursor:"pointer" }} onClick={()=>{setNewCatParent(cat.id);setNewCatModal(true);}}><span style={{ fontSize:10, color:"#3a3530" }}>+ Unterbereich</span></div>}
            </div>
          ))}
          <div style={{ padding:"10px 14px", cursor:"pointer", marginTop:4 }} onClick={()=>{setNewCatParent(null);setNewCatModal(true);}}>
            <span style={{ fontSize:11, color:"#4a4540" }}>+ Neuer Bereich</span>
          </div>
        </nav>
      </aside>

      {/* Note list */}
      <div style={{ width:268, minWidth:268, background:"#141210", borderRight:"1px solid #2a2520", display:"flex", flexDirection:"column" }}>
        <div style={{ padding:"18px 16px 14px", borderBottom:"1px solid #2a2520", display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
          <button onClick={()=>setSidebarOpen(o=>!o)} style={{ background:"none", border:"none", cursor:"pointer", color:"#5a5248", fontSize:16, padding:0 }}>☰</button>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:14, fontWeight:600, color:filterOD?"#c8574e":selId?selColor:"#6a6258", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
              {filterOD?"Überfällig":search?"Suche":selId?getCatLabel(selId):"Bereich wählen"}
            </div>
            <div style={{ fontSize:10, color:"#4a4540", marginTop:1 }}>{displayNotes.length} Notizen</div>
          </div>
          {selId&&!filterOD&&<button onClick={newNote} style={{ background:selColor, border:"none", borderRadius:5, color:"#0f0e0d", fontSize:16, width:26, height:26, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, flexShrink:0 }}>+</button>}
        </div>
        <div style={{ flex:1, overflowY:"auto" }}>
          {displayNotes.length===0&&<div style={{ padding:"32px 16px", color:"#3a3530", fontSize:12, textAlign:"center", lineHeight:1.8 }}>{selId||filterOD?"Keine Notizen.":"Einen Bereich\nauswählen."}</div>}
          {displayNotes.map(n=>{ const ds=deadlineStatus(n.deadline); const isA=note?.id===n.id; return (
            <div key={n.id} onClick={()=>openNote(n)} style={{ padding:"13px 16px", borderBottom:"1px solid #1e1b18", cursor:"pointer", background:isA?"#1e1b18":"transparent", borderLeft:isA?`2px solid ${getCatColor(n.catId)}`:"2px solid transparent" }}>
              <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:13, fontWeight:500, color:isA?"#e8e2d9":"#c0b8ae", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", marginBottom:3 }}>{n.title||"Ohne Titel"}</div>
              {(search||filterOD)&&<div style={{ fontSize:9, color:getCatColor(n.catId), marginBottom:3, letterSpacing:"0.08em", textTransform:"uppercase" }}>{getCatLabel(n.catId)}</div>}
              <div style={{ fontSize:11, color:"#5a5248", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", marginBottom:4 }}>{(n.body||"").slice(0,55)||"—"}</div>
              <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                <div style={{ fontSize:9, color:"#3a3530" }}>{fmtDate(n.updatedAt)}</div>
                {(n.attachments||[]).length>0&&<div style={{ fontSize:9, color:"#4a4540" }}>· {(n.attachments||[]).length}×📎</div>}
                {ds&&<div style={{ fontSize:9, color:ds.color }}>· ⏱ {ds.label}</div>}
              </div>
            </div>
          );})}
        </div>
      </div>

      {/* Editor */}
      <main style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        {note?(<>
          <div style={{ padding:"14px 28px", borderBottom:"1px solid #2a2520", display:"flex", alignItems:"center", gap:10, background:"#0f0e0d", flexShrink:0 }}>
            <div style={{ flex:1, fontSize:9, color:selColor, letterSpacing:"0.14em", textTransform:"uppercase" }}>{getCatLabel(note.catId)}</div>
            {editing
              ?<><button onClick={saveNote} style={{ background:selColor, color:"#0f0e0d", border:"none", borderRadius:5, padding:"6px 16px", fontSize:12, cursor:"pointer", fontWeight:600 }}>Speichern</button><button onClick={()=>{setEditing(false);setETitle(note.title);setEBody(note.body||"");setEDl(note.deadline||"");setShowDl(!!note.deadline);}} style={gBtn}>Abbrechen</button></>
              :<><button onClick={()=>setEditing(true)} style={gBtn}>Bearbeiten</button><button onClick={deleteNote} style={{ background:"none", color:"#6a3a36", border:"1px solid #2a2520", borderRadius:5, padding:"6px 10px", fontSize:12, cursor:"pointer" }}>✕</button></>}
          </div>
          {!editing&&note.deadline&&<div style={{ padding:"8px 28px", borderBottom:"1px solid #1e1b18", background:dlSt?.bg||"transparent", flexShrink:0 }}>
            <span style={{ fontSize:11, color:dlSt?.color||"#8a8278" }}>⏱ {new Date(note.deadline).toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"})} — {dlSt?.label}</span>
          </div>}
          <div style={{ flex:1, overflowY:"auto", padding:"36px 52px 60px" }}>
            {editing
              ?<input value={eTitle} onChange={e=>setETitle(e.target.value)} placeholder="Titel …" style={{ width:"100%", background:"none", border:"none", outline:"none", fontFamily:"'Playfair Display',Georgia,serif", fontSize:28, fontWeight:600, color:"#e8e2d9", marginBottom:20, lineHeight:1.3, display:"block" }}/>
              :<><h1 style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:28, fontWeight:600, color:"#e8e2d9", marginBottom:10, lineHeight:1.3 }}>{note.title}</h1><div style={{ fontSize:10, color:"#3a3530", marginBottom:32 }}>{fmtDate(note.updatedAt)}</div></>}
            {editing&&<div style={{ marginBottom:20 }}>
              {!showDl
                ?<button onClick={()=>setShowDl(true)} style={{ ...gBtn, display:"flex", alignItems:"center", gap:5 }}>⏱ Frist setzen</button>
                :<div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:11, color:"#8a8278" }}>⏱</span>
                  <input type="date" value={eDl} onChange={e=>setEDl(e.target.value)} style={{ background:"#1a1715", border:"1px solid #3a3530", borderRadius:5, color:"#c8c0b4", padding:"5px 10px", fontSize:13, outline:"none" }}/>
                  <button onClick={()=>{setShowDl(false);setEDl("");}} style={{ background:"none", border:"none", color:"#5a5248", cursor:"pointer" }}>✕</button>
                </div>}
            </div>}
            {editing&&<div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
              <span style={{ fontSize:10, color:"#4a4540", letterSpacing:"0.1em", textTransform:"uppercase" }}>Text</span>
              <div style={{ flex:1, height:1, background:"#1e1b18" }}/>
              <VoiceBtn onText={t=>setEBody(p=>p+(p.trim()?" ":"")+t)} onErr={setErr} big={false}/>
            </div>}
            {editing
              ?<textarea ref={bodyRef} value={eBody} onChange={e=>setEBody(e.target.value)} placeholder="Hier tippen oder 🎙 einsprechen …" style={{ width:"100%", background:"none", border:"none", outline:"none", fontFamily:"'Source Serif 4',Georgia,serif", fontSize:15, color:"#c8c0b4", lineHeight:1.85, resize:"none", minHeight:180, marginBottom:36 }}/>
              :<div style={{ fontFamily:"'Source Serif 4',Georgia,serif", fontSize:15, color:"#c8c0b4", lineHeight:1.85, whiteSpace:"pre-wrap", marginBottom:36 }}>{note.body||<span style={{ color:"#3a3530", fontStyle:"italic" }}>Leer — Bearbeiten zum Schreiben.</span>}</div>}
            <div style={{ borderTop:"1px solid #1e1b18", paddingTop:22 }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
                <span style={{ fontSize:10, color:"#5a5248", letterSpacing:"0.12em", textTransform:"uppercase" }}>Anhänge {attachments.length>0&&`(${attachments.length})`}</span>
                <div style={{ display:"flex", gap:6 }}>
                  {[["📷 Kamera",openCam],["🖼 Bild",()=>imgRef.current?.click()],["📄 Dok.",()=>docRef.current?.click()]].map(([l,fn])=>(
                    <button key={l} onClick={fn} style={gBtn}>{l}</button>
                  ))}
                </div>
              </div>
              <input ref={imgRef} type="file" accept="image/*" style={{ display:"none" }} onChange={e=>{if(e.target.files[0])handleImg(e.target.files[0]);e.target.value="";}}/>
              <input ref={docRef} type="file" accept=".pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx,.csv,.zip" style={{ display:"none" }} onChange={e=>{if(e.target.files[0])handleDoc(e.target.files[0]);e.target.value="";}}/>
              {uploading&&<div style={{ fontSize:12, color:"#8a8278", marginBottom:10 }}>Wird verarbeitet …</div>}
              {err&&<div style={{ fontSize:11, color:"#c8574e", marginBottom:10, padding:"6px 10px", background:"#1e1b18", borderRadius:5, display:"flex", gap:8 }}><span style={{ flex:1 }}>{err}</span><button onClick={()=>setErr("")} style={{ background:"none", border:"none", color:"#c8574e", cursor:"pointer" }}>✕</button></div>}
              {imgs.length>0&&<div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))", gap:8, marginBottom:docs.length>0?10:0 }}>{imgs.map(a=><AttachThumb key={a.id} attach={a} onOpen={openLb} onDelete={delAttachment}/>)}</div>}
              {docs.map(a=>(
                <div key={a.id} onClick={()=>openLb(a)} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", background:"#1a1715", border:"1px solid #2a2520", borderRadius:6, marginTop:6, cursor:"pointer" }}>
                  <span style={{ fontSize:20 }}>{docIcon(a.ext)}</span>
                  <div style={{ flex:1, minWidth:0 }}><div style={{ fontSize:12, color:"#c0b8ae", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{a.name}</div><div style={{ fontSize:10, color:"#4a4540" }}>{fmtBytes(a.size)}</div></div>
                  <button onClick={e=>{e.stopPropagation();delAttachment(a);}} style={{ background:"none", border:"none", color:"#4a4540", cursor:"pointer", fontSize:14 }}>✕</button>
                </div>
              ))}
              {attachments.length===0&&!uploading&&<div style={{ fontSize:11, color:"#3a3530", fontStyle:"italic" }}>Noch keine Anhänge.</div>}
              <div style={{ marginTop:12, fontSize:9, color:"#2e2b28" }}>Bilder komprimiert · Dokumente max. 4 MB · In diesem Browser gespeichert</div>
            </div>
          </div>
        </>):(
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
            <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:48, color:"#2a2520", fontStyle:"italic" }}>—</div>
            <div style={{ fontSize:13, color:"#3a3530" }}>{selId?"Notiz auswählen oder + drücken":"Einen Bereich wählen"}</div>
          </div>
        )}
      </main>

      {/* Camera */}
      {camOpen&&<div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", zIndex:300, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:20 }}>
        <video ref={vidRef} autoPlay playsInline style={{ maxWidth:500, width:"92vw", borderRadius:12, background:"#1a1715" }}/>
        <div style={{ display:"flex", gap:14 }}>
          <button onClick={capturePhoto} style={{ background:"#c8a96e", border:"none", borderRadius:10, color:"#0f0e0d", padding:"12px 28px", fontSize:15, cursor:"pointer", fontWeight:700 }}>📸 Aufnehmen</button>
          <button onClick={()=>setCamOpen(false)} style={{ background:"none", border:"1px solid #3a3530", borderRadius:10, color:"#8a8278", padding:"12px 20px", fontSize:15, cursor:"pointer" }}>Abbrechen</button>
        </div>
      </div>}

      {/* Lightbox */}
      {lightbox&&<div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", zIndex:300, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16 }} onClick={()=>setLightbox(null)}>
        <div style={{ fontSize:12, color:"#8a8278" }}>{lightbox.name}</div>
        {lightbox.type==="image"?<img src={lightbox.dataUrl} alt="" style={{ maxWidth:"92vw", maxHeight:"76vh", borderRadius:8, objectFit:"contain" }}/>:<div style={{ background:"#1a1715", borderRadius:10, padding:"40px 60px", textAlign:"center" }}><div style={{ fontSize:56, marginBottom:12 }}>{docIcon(lightbox.ext)}</div><div style={{ fontSize:14, color:"#c0b8ae" }}>{lightbox.name}</div></div>}
        <div style={{ display:"flex", gap:12 }} onClick={e=>e.stopPropagation()}>
          <button onClick={()=>{const a=document.createElement("a");a.href=lightbox.dataUrl;a.download=lightbox.name;a.click();}} style={{ background:"#c8a96e", border:"none", borderRadius:8, color:"#0f0e0d", padding:"10px 20px", fontSize:13, cursor:"pointer", fontWeight:700 }}>↓ Herunterladen</button>
          <button onClick={()=>setLightbox(null)} style={{ background:"none", border:"1px solid #3a3530", borderRadius:8, color:"#8a8278", padding:"10px 16px", fontSize:13, cursor:"pointer" }}>Schließen</button>
        </div>
      </div>}

      {/* New category modal */}
      {newCatModal&&<div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }} onClick={()=>setNewCatModal(false)}>
        <div style={{ background:"#1a1715", border:"1px solid #3a3530", borderRadius:12, padding:"28px 24px", minWidth:320 }} onClick={e=>e.stopPropagation()}>
          <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:16, marginBottom:16, color:"#e8e2d9" }}>{newCatParent?`Unterbereich zu „${cats.find(c=>c.id===newCatParent)?.label}"`:"Neuer Lebensbereich"}</div>
          <input autoFocus value={newCatLabel} onChange={e=>setNewCatLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCat(newCatParent,newCatLabel)} placeholder="Name …" style={{ width:"100%", background:"#0f0e0d", border:"1px solid #3a3530", borderRadius:8, padding:"10px 12px", color:"#e8e2d9", fontSize:15, outline:"none", marginBottom:16 }}/>
          <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
            <button onClick={()=>setNewCatModal(false)} style={{ background:"none", border:"1px solid #3a3530", borderRadius:6, color:"#6a6258", padding:"8px 14px", cursor:"pointer", fontSize:13 }}>Abbrechen</button>
            <button onClick={()=>addCat(newCatParent,newCatLabel)} style={{ background:"#c8a96e", border:"none", borderRadius:6, color:"#0f0e0d", padding:"8px 18px", cursor:"pointer", fontSize:13, fontWeight:700 }}>Erstellen</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────

function App() {
  const [mobile, setMobile] = useState(isMobile);
  useEffect(()=>{ const fn=()=>setMobile(isMobile()); window.addEventListener("resize",fn); return ()=>window.removeEventListener("resize",fn); },[]);
  return mobile ? <MobileView/> : <DesktopView/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
